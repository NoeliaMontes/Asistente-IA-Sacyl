services:

  database:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: upsa
      POSTGRES_USER: system
      POSTGRES_PASSWORD: manager
      PGDATA: /var/lib/postgresql/18/docker
    volumes:
      - vol_database:/var/lib/postgresql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - 5555:5432
    command: ["-c","max_prepared_transactions=100"]
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U system -d upsa"]
      interval: 5s
      timeout: 3s
      retries: 3


  flyway:
    image: flyway/flyway
    environment:
      FLYWAY_USER: system
      FLYWAY_PASSWORD: manager
      FLYWAY_URL: jdbc:postgresql://database:5432/upsa
      FLYWAY_LOCATIONS: filesystem:/flyway/locations/ws-medicamentos,filesystem:/flyway/locations/ws-pacientes,filesystem:/flyway/locations/ws-medicos,filesystem:/flyway/locations/ws-citas,filesystem:/flyway/locations/ws-posologias
     #Para asegurar que siempre migra
      FLYWAY_BASELINE_ON_MIGRATE: "true"
    volumes:
      - ./ws-medicamentos/flyway:/flyway/locations/ws-medicamentos
      - ./ws-pacientes/flyway:/flyway/locations/ws-pacientes
      - ./ws-medicos/flyway:/flyway/locations/ws-medicos
      - ./ws-citas/flyway:/flyway/locations/ws-citas
      - ./ws-posologias/flyway:/flyway/locations/ws-posologias
    command:
      - migrate
    depends_on:
      database:
        condition: service_healthy

  ws-medicamentos:
    build:
      context: ./ws-medicamentos
      dockerfile: Dockerfile
    environment:
      DATABASE_HOST: database
      DATABASE_PORT: 5432
      DATABASE_NAME: upsa
      DATABASE_USERNAME: system
      DATABASE_PASSWORD: manager

  ws-pacientes:
    build:
      context: ./ws-pacientes
      dockerfile: Dockerfile
    environment:
      DATABASE_HOST: database
      DATABASE_PORT: 5432
      DATABASE_NAME: upsa
      DATABASE_USERNAME: system
      DATABASE_PASSWORD: manager


  ws-medicos:
    build:
      context: ./ws-medicos
      dockerfile: Dockerfile
    environment:
      DATABASE_HOST: database
      DATABASE_PORT: 5432
      DATABASE_NAME: upsa
      DATABASE_USERNAME: system
      DATABASE_PASSWORD: manager


  ws-citas:
    build:
      context: ./ws-citas
      dockerfile: Dockerfile
    environment:
      DATABASE_HOST: database
      DATABASE_PORT: 5432
      DATABASE_NAME: upsa
      DATABASE_USERNAME: system
      DATABASE_PASSWORD: manager


  ws-posologias:
    build:
      context: ./ws-posologias
      dockerfile: Dockerfile
    environment:
      DATABASE_HOST: database
      DATABASE_PORT: 5432
      DATABASE_NAME: upsa
      DATABASE_USERNAME: system
      DATABASE_PASSWORD: manager

  aggregator:
    build:
      context: ./aggregator
      dockerfile: Dockerfile
    depends_on:
      - ws-medicos
      - ws-pacientes
      - ws-medicamentos
      - ws-citas
      - ws-posologias


  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_HOST: database
      DATABASE_PORT: 5432
      DATABASE_NAME: upsa
      DATABASE_USERNAME: system
      DATABASE_PASSWORD: manager
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    volumes:
      - ./backend/docs:/deployments/docs
    depends_on:
      - aggregator



  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend

  iniciosesion:
    build:
      context: ./iniciosesion
      dockerfile: Dockerfile
    depends_on:
      - frontend
      - security

  security:
    build:
      context: ./security
      dockerfile: Dockerfile


  ngnix:
    image: nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    ports:
      - 80:80
    depends_on:
      - frontend
      - backend
      - iniciosesion

volumes:
  vol_database: {}
