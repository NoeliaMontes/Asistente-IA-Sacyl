worker_processes auto;
events{
    worker_connections 1024;
}

http
{
    upstream ups_medicamentos
    {
        server ws-medicamentos:8080;
    }
    upstream ups_medicos
    {
        server ws-medicos:8080;
    }
    upstream ups_pacientes
    {
        server ws-pacientes:8080;
    }
    upstream ups_posologias
    {
        server ws-posologias:8080;
    }
    upstream ups_citas
    {
        server ws-citas:8080;
    }
    upstream ups_aggregator
    {
        server aggregator:8080;
    }
     upstream ups_backend
    {
        server backend:8080;
    }
     upstream ups_frontend
    {
        server frontend:8080;
    }
     upstream ups_iniciosesion
    {
        server iniciosesion:8080;
    }
    upstream ups_security
    {
        server security:8080;
    }


    server
    {
        listen 80;
        server_name xxx.upsa.es;


        #Aggregator
        location  /aggregator
        {
            proxy_pass http://ups_aggregator;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /aggregator/swagger-ui/ {
            proxy_pass http://ups_aggregator/aggregator/swagger-ui/;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /aggregator/q/ {
            proxy_pass http://ups_aggregator/q/;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Real-IP $remote_addr;
        }


        #Medicamentos
        location /medicamentos
        {
            proxy_pass http://ups_medicamentos;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /medicamentos/swagger-ui/ {
            proxy_pass http://ups_medicamentos/medicamentos/swagger-ui/;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /medicamentos/q/ {
            proxy_pass http://ups_medicamentos/q/;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Real-IP $remote_addr;
        }

        #Pacientes
        location /pacientes
        {
            proxy_pass http://ups_pacientes;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /pacientes/swagger-ui/ {
            proxy_pass http://ups_pacientes/pacientes/swagger-ui/;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /pacientes/q/ {
            proxy_pass http://ups_pacientes/q/;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Real-IP $remote_addr;
        }


        #Medicos
        location /medicos
        {
            proxy_pass http://ups_medicos;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
