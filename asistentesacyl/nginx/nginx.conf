worker_processes auto;
events{
    worker_connections 1024;
}

http
{
    upstream ups_medicamentos
    {
        server ws-medicamentos:8080;
    }
    upstream ups_medicos
    {
        server ws-medicos:8080;
    }
    upstream ups_pacientes
    {
        server ws-pacientes:8080;
    }
    upstream ups_posologias
    {
        server ws-posologias:8080;
    }
    upstream ups_citas
    {
        server ws-citas:8080;
    }
    upstream ups_aggregator
    {
        server aggregator:8080;
    }
     upstream ups_backend
    {
        server backend:8080;
    }
     upstream ups_frontend
    {
        server frontend:8080;
    }
     upstream ups_iniciosesion
    {
        server iniciosesion:8080;
    }
    upstream ups_security
    {
        server security:8080;
    }


    server
    {
        listen 80;
        server_name xxx.upsa.es;


        location  /aggregator
        {
            proxy_pass http://ups_aggregator;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /medicamentos
        {
            proxy_pass http://ups_medicamentos;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /pacientes
        {
            proxy_pass http://ups_pacientes;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /medicos
        {
            proxy_pass http://ups_medicos;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /posologias
        {
            proxy_pass http://ups_posologias;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /citas
        {
            proxy_pass http://ups_citas;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /backend
        {
            proxy_pass http://ups_backend;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /frontend/
        {
            proxy_pass http://ups_frontend/;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /iniciosesion/
        {
            proxy_pass http://ups_iniciosesion/;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /security/
        {
            proxy_pass http://ups_security/;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /chat/ {

        proxy_pass http://ups_frontend/chat/;

        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;

        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
    }
    }
}